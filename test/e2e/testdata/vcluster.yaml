experimental:
  deploy:
    vcluster:
      manifests: |-
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: test
          namespace: default
        spec:
          type: ClusterIP
          selector:
            app: test
          ports:
            - protocol: TCP
              port: 80
              targetPort: 80
        ---
        apiVersion: v1
        kind: Pod
        metadata:
          name: test
          namespace: default
          labels:
            app: test
        spec:
          containers:
            - name: test
              image: busybox:1.36
              command: ["sleep", "900"]
              ports:
                - containerPort: 80

        ---
        apiVersion: v1
        kind: Pod
        metadata:
          name: test-with-host-network
          namespace: default
        spec:
          hostNetwork: true
          containers:
            - name: test
              image: busybox:1.36
              command: ["sleep", "900"]
