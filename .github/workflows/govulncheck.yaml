name: govulncheck

on:
  pull_request:
    branches:
      - main
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: Scan for known Go vulnerabilities
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'loft-sh' # do not run on forks
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run govulncheck
        uses: loft-sh/github-actions/.github/actions/govulncheck@govulncheck/v1
        with:
          notify: "false" # PR runs never notify; gate by exit code only
