name: Release

on:
  release:
    types: [created]

jobs:
  publish:
    if: github.repository_owner == 'loft-sh' && startsWith(github.ref, 'refs/tags/v') == true

    name: Publish vcluster-candy

    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write   # Required to push to GHCR
      id-token: write   # Required for Cosign keyless OIDC signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Version preparation
      - name: Fetch tags
        run: git fetch --force --tags

      - name: Get the version
        id: get_version
        run: |
          RELEASE_VERSION=$(echo "$GITHUB_REF" | sed -nE 's!refs/tags/!!p')
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$(git describe --abbrev=0 --tags "$(git rev-list --tags --skip=1 --max-count=1)")" >> "$GITHUB_OUTPUT"

      - name: Validate semver
        id: semver
        uses: loft-sh/github-actions/.github/actions/semver-validation@semver-validation/v1
        with:
          version: ${{ steps.get_version.outputs.release_version }}

      # Prerequisites
      - name: Setup helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "v4.2.0"

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: "v3.0.6"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm Client)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build, push and sign docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build-push-docker
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vcluster-candy:${{ steps.get_version.outputs.release_version }}

      - name: Sign Docker Image
        env:
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/vcluster-candy:${{ steps.get_version.outputs.release_version }}
          IMAGE_DIGEST: ${{ steps.build-push-docker.outputs.digest }}
        run: cosign sign --yes "${IMAGE_TAG}@${IMAGE_DIGEST}"

      # Package and push helm chart
      - name: Package Helm Chart
        id: build-push-helm-chart
        env:
          VERSION: ${{ steps.get_version.outputs.release_version }}
        run: |
          set -euo pipefail
          CHART_VERSION=${VERSION#v}
          helm package ./chart --destination ./.deploy --version ${CHART_VERSION} --app-version ${VERSION}

          # Push to OCI registry and capture stdout
          OUTPUT=$(helm push ./.deploy/*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts 2>&1)
          
          # Extract tag and digest
          CHART_TAG=$(echo "$OUTPUT" | awk '/Pushed:/ {print $2}')
          echo "chart_tag=$CHART_TAG" >> $GITHUB_OUTPUT
          
          CHART_DIGEST=$(echo "$OUTPUT" | awk '/Digest:/ {print $2}')
          echo "chart_digest=$CHART_DIGEST" >> $GITHUB_OUTPUT

      - name: Sign Helm Chart Artifact
        env:
          CHART_TAG: ${{ steps.build-push-helm-chart.outputs.chart_tag }}
          CHART_DIGEST: ${{ steps.build-push-helm-chart.outputs.chart_digest }}
        run: |
          cosign sign --yes "${CHART_TAG}@${CHART_DIGEST}"
